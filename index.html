<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Space Runner</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', monospace;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 100%;
        }
        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0a0c12;
            border-radius: 24px;
            touch-action: none;
            cursor: pointer;
        }
        .ui-top {
            display: flex;
            justify-content: space-between;
            padding: 10px 4px 14px 4px;
            color: #c0d0e6;
            font-size: 18px;
            font-weight: bold;
        }
        .ui-top span {
            background: #0f1117;
            padding: 6px 18px;
            border-radius: 30px;
        }
        .ui-top .best { color: #f39c12; }
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding-top: 16px;
            flex-wrap: wrap;
        }
        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0b0e12;
        }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #0b0e12; }
        .btn-primary {
            background: #2ecc71;
            color: #0a0c12;
            box-shadow: 0 3px 0 #1e8a4c;
        }
        @media (max-width: 500px) {
            .game-wrapper { padding: 12px; }
            .game-panel { padding: 12px; }
            .ui-top { font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel">
        <div class="ui-top">
            <span>🚀 <span id="scoreDisplay">0</span></span>
            <span class="best">🏆 <span id="bestDisplay">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <button id="restartBtn" class="btn-primary">🔄 НАЧАТЬ</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');

        const W = 400, H = 600;
        const PLAYER_SIZE = 28;

        let player = { x: W/2 - PLAYER_SIZE/2, y: H - 100, size: PLAYER_SIZE };
        let enemies = [];
        let bullets = [];
        let portals = [];
        let stars = [];
        let shieldActive = false;
        let shieldTimer = 0;
        let gunsActive = false;
        let gunsTimer = 0;
        let score = 0, bestScore = 0, gameOver = false, gameStarted = false;
        let speed = 3, spawnTimer = 0;
        let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
        let touchX = null, touchY = null;
        let portalCooldown = 0;

        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 1, speed: Math.random() * 0.5 + 0.2 });
            }
        }

        function loadBest() {
            try { const saved = localStorage.getItem('spaceRunnerBest'); if (saved) bestScore = parseInt(saved) || 0; } catch (e) {}
            bestDisplay.textContent = bestScore;
        }

        function saveBest() {
            if (score > bestScore) { bestScore = score; localStorage.setItem('spaceRunnerBest', String(bestScore)); bestDisplay.textContent = bestScore; }
        }

        function spawnEnemy() {
            const type = Math.random();
            let enemy = { type: 'normal', x: 0, y: -30, r: 20, speed: speed, phase: 0 };
            if (type < 0.30) {
                enemy.type = 'red';
                enemy.r = 18;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
                enemy.shootTimer = 0;
                enemy.shootInterval = 90; // 1.5 сек
            } else if (type < 0.60) {
                enemy.type = 'blue';
                enemy.r = 16;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
                enemy.phase = Math.random() * Math.PI * 2;
            } else if (type < 0.85) {
                enemy.type = 'purple';
                enemy.r = 22;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
            } else {
                const bonusType = Math.random() > 0.5 ? 'shield' : 'guns';
                enemy.type = bonusType;
                enemy.r = 14;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
            }
            enemies.push(enemy);
        }

        function spawnPortal() {
            if (portals.length >= 2) return;
            const x1 = 50 + Math.random() * (W - 100);
            const x2 = 50 + Math.random() * (W - 100);
            portals = [
                { x: x1, y: -30, w: 30, h: 30, id: 1, speed: speed },
                { x: x2, y: -30 - 80, w: 30, h: 30, id: 2, speed: speed }
            ];
        }

        function update() {
            if (!gameStarted || gameOver) return;

            speed += 0.002;
            score += Math.floor(speed * 0.8) + 1;
            scoreDisplay.textContent = score;

            spawnTimer++;
            const spawnRate = Math.max(18, 60 - speed * 1.2);
            if (spawnTimer > spawnRate) {
                spawnTimer = 0;
                spawnEnemy();
                if (Math.random() > 0.7) spawnEnemy();
                if (Math.random() > 0.95 && portals.length === 0) spawnPortal();
            }

            // Управление
            if (keys.ArrowLeft) player.x -= 6;
            if (keys.ArrowRight) player.x += 6;
            if (keys.ArrowUp) player.y -= 6;
            if (keys.ArrowDown) player.y += 6;
            if (touchX !== null) {
                const dx = touchX - (player.x + player.size / 2);
                const dy = touchY - (player.y + player.size / 2);
                if (Math.abs(dx) > 8) player.x += Math.sign(dx) * 6;
                if (Math.abs(dy) > 8) player.y += Math.sign(dy) * 6;
            }
            player.x = Math.max(0, Math.min(W - player.size, player.x));
            player.y = Math.max(0, Math.min(H - player.size, player.y));

            // Щит
            if (shieldActive) {
                shieldTimer--;
                if (shieldTimer <= 0) shieldActive = false;
            }

            // Пушка — 1 луч каждые 30 кадров (0.5 сек)
            if (gunsActive) {
                gunsTimer--;
                if (gunsTimer <= 0) {
                    gunsActive = false;
                } else if (gunsTimer % 30 === 0) {
                    bullets.push({ x: player.x + player.size/2 - 2, y: player.y - 5, dx: 0, dy: -12, w: 4, h: 14, color: '#ffaa00' });
                }
            }

            // Пули
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.dx;
                b.y += b.dy;
                if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) { bullets.splice(i, 1); continue; }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (e.type === 'shield' || e.type === 'guns') continue;
                    const dx = b.x - e.x;
                    const dy = b.y - e.y;
                    if (dx*dx + dy*dy < e.r * e.r) {
                        enemies.splice(j, 1);
                        bullets.splice(i, 1);
                        score += 50;
                        break;
                    }
                }
            }

            // Враги
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed || speed;

                if (e.type === 'red') {
                    e.shootTimer = (e.shootTimer || 0) + 1;
                    if (e.shootTimer > e.shootInterval) {
                        e.shootTimer = 0;
                        enemies.push({ type: 'mini', x: e.x - 10, y: e.y, r: 6, speed: speed * 0.8, dx: 0, dy: 2 });
                        enemies.push({ type: 'mini', x: e.x + 10, y: e.y, r: 6, speed: speed * 0.8, dx: 0, dy: 2 });
                    }
                }

                if (e.type === 'blue') {
                    e.phase += 0.07;
                    e.x += Math.sin(e.phase) * 2.2;
                }

                if (e.type === 'purple') {
                    const dx = player.x + player.size/2 - e.x;
                    const dy = player.y + player.size/2 - e.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 160) {
                        e.x += dx * 0.025;
                        e.y += dy * 0.025;
                    }
                }

                if (e.type === 'mini') {
                    e.x += e.dx || 0;
                    e.y += e.speed || speed * 0.8;
                    if (e.x < 0 || e.x > W) e.dx = -e.dx;
                }

                if (e.y > H + 50) { enemies.splice(i, 1); continue; }

                // Столкновение с игроком
                if (e.type !== 'shield' && e.type !== 'guns') {
                    const dx = player.x + player.size/2 - e.x;
                    const dy = player.y + player.size/2 - e.y;
                    if (dx*dx + dy*dy < (e.r + player.size/2) * (e.r + player.size/2)) {
                        if (shieldActive) {
                            // Щит защищает, даём 1 сек неуязвимости
                            shieldActive = false;
                            // Неуязвимость 1 сек (60 кадров)
                            let invincibleTimer = 60;
                            const invincibleInterval = setInterval(() => {
                                invincibleTimer--;
                                if (invincibleTimer <= 0) {
                                    clearInterval(invincibleInterval);
                                }
                            }, 16);
                            // Удаляем врага, который ударил
                            enemies.splice(i, 1);
                            continue;
                        } else {
                            gameOver = true;
                            saveBest();
                            return;
                        }
                    }
                }

                // Бонусы
                if (e.type === 'shield') {
                    const dx = player.x + player.size/2 - e.x;
                    const dy = player.y + player.size/2 - e.y;
                    if (dx*dx + dy*dy < (e.r + player.size/2) * (e.r + player.size/2)) {
                        shieldActive = true;
                        shieldTimer = 600;
                        enemies.splice(i, 1);
                        continue;
                    }
                }
                if (e.type === 'guns') {
                    const dx = player.x + player.size/2 - e.x;
                    const dy = player.y + player.size/2 - e.y;
                    if (dx*dx + dy*dy < (e.r + player.size/2) * (e.r + player.size/2)) {
                        gunsActive = true;
                        gunsTimer = 420;
                        enemies.splice(i, 1);
                        continue;
                    }
                }
            }

            // Порталы
            portalCooldown--;
            for (let i = portals.length - 1; i >= 0; i--) {
                const p = portals[i];
                p.y += p.speed;
                if (p.y > H + 50) { portals.splice(i, 1); continue; }
                const dx = player.x + player.size/2 - (p.x + p.w/2);
                const dy = player.y + player.size/2 - (p.y + p.h/2);
                if (dx*dx + dy*dy < 400 && portalCooldown <= 0) {
                    const other = portals.find(pp => pp.id !== p.id);
                    if (other) {
                        player.x = other.x + other.w/2 - player.size/2;
                        player.y = other.y + other.h/2 - player.size/2;
                        portalCooldown = 30;
                    }
                }
            }

            for (let s of stars) {
                s.y += s.speed;
                if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            for (let s of stars) {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${0.3 + s.size*0.15})`;
                ctx.fill();
            }

            for (let e of enemies) {
                if (e.type === 'shield') {
                    ctx.fillStyle = '#00ff88'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ff88';
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('🛡️', e.x, e.y+4);
                    continue;
                }
                if (e.type === 'guns') {
                    ctx.fillStyle = '#ff8800'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff8800';
                    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('🔫', e.x, e.y+4);
                    continue;
                }
                ctx.shadowBlur = 10;
                let color = '#888';
                if (e.type === 'red') color = '#ff4444';
                else if (e.type === 'blue') color = '#4488ff';
                else if (e.type === 'purple') color = '#aa44ff';
                else if (e.type === 'mini') color = '#ff8844';
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.beginPath(); ctx.arc(e.x-3, e.y-4, e.r*0.3, 0, Math.PI*2); ctx.fill();
            }

            for (let p of portals) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ccff';
                ctx.fillStyle = '#004466';
                ctx.fillRect(p.x, p.y, p.w, p.h);
                ctx.strokeStyle = '#00ccff';
                ctx.lineWidth = 2;
                ctx.strokeRect(p.x, p.y, p.w, p.h);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#00ccff';
                ctx.font = '18px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('🌀', p.x + p.w/2, p.y + p.h - 6);
                ctx.fillStyle = 'rgba(0,200,255,0.2)';
                ctx.fillRect(p.x + 5, p.y + 5, p.w - 10, p.h - 10);
            }

            for (let b of bullets) {
                ctx.fillStyle = b.color || '#ffaa00';
                ctx.shadowBlur = 15;
                ctx.shadowColor = b.color || '#ffaa00';
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.shadowBlur = 0;
            }

            const px = player.x, py = player.y, s = player.size;
            if (shieldActive) {
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#00ff88';
                ctx.strokeStyle = 'rgba(0,255,136,0.4)';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(px + s/2, py + s/2, s/2 + 6, 0, Math.PI*2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#2ecc71';
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(px + s/2, py);
            ctx.lineTo(px + s, py + s);
            ctx.lineTo(px, py + s);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.moveTo(px, py + 4);
            ctx.lineTo(px - 6, py + 14);
            ctx.lineTo(px, py + 14);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(px + s, py + 4);
            ctx.lineTo(px + s + 6, py + 14);
            ctx.lineTo(px + s, py + 14);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#a0d8f1';
            ctx.beginPath();
            ctx.arc(px + s/2, py + s * 0.35, 5, 0, Math.PI*2);
            ctx.fill();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('💥', W/2, H/2 - 30);
                ctx.font = '20px monospace';
                ctx.fillStyle = '#e74c3c';
                ctx.fillText('ИГРА ОКОНЧЕНА', W/2, H/2 + 30);
                ctx.fillStyle = '#c0d0e6';
                ctx.font = '16px monospace';
                ctx.fillText('Нажми «НАЧАТЬ»', W/2, H/2 + 70);
            }
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = '24px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('🚀 КОСМИЧЕСКИЙ РАННЕР', W/2, H/2 - 20);
                ctx.font = '16px monospace';
                ctx.fillStyle = '#c0d0e6';
                ctx.fillText('Нажми «НАЧАТЬ»', W/2, H/2 + 30);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            player.x = W/2 - PLAYER_SIZE/2;
            player.y = H - 100;
            enemies = [];
            bullets = [];
            portals = [];
            score = 0;
            speed = 3;
            spawnTimer = 0;
            gameOver = false;
            gameStarted = true;
            shieldActive = false;
            shieldTimer = 0;
            gunsActive = false;
            gunsTimer = 0;
            portalCooldown = 0;
            scoreDisplay.textContent = '0';
            loadBest();
            initStars();
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (e.key in keys) { keys[e.key] = true; e.preventDefault(); }
                if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); if (gameOver || !gameStarted) resetGame(); }
            });
            document.addEventListener('keyup', (e) => {
                if (e.key in keys) { keys[e.key] = false; e.preventDefault(); }
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameOver || !gameStarted) { resetGame(); return; }
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches[0];
                touchX = (touch.clientX - rect.left) * scaleX;
                touchY = (touch.clientY - rect.top) * scaleY;
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches[0];
                touchX = (touch.clientX - rect.left) * scaleX;
                touchY = (touch.clientY - rect.top) * scaleY;
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchX = null;
                touchY = null;
            });
            document.getElementById('restartBtn').addEventListener('click', resetGame);
        }

        function start() {
            initStars();
            loadBest();
            setupControls();
            gameLoop();
        }
        start();
    })();
</script>
</body>
</html>
