<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SpaceRun</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; padding: 0; background: #0a0c12; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', monospace; overflow: hidden; touch-action: none; }
        .game-wrapper { background: #0f1117; border-radius: 48px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 500px; width: 100%; }
        .game-panel { background: #07090e; border-radius: 32px; padding: 20px; position: relative; }
        canvas { display: block; width: 100%; height: auto; background: #0a0c12; border-radius: 24px; touch-action: none; cursor: pointer; }
        .ui-top { display: flex; justify-content: space-between; padding: 10px 4px 14px 4px; color: #c0d0e6; font-size: 18px; font-weight: bold; }
        .ui-top span { background: #0f1117; padding: 6px 18px; border-radius: 30px; }
        .ui-top .best { color: #f39c12; }
        .controls { display: flex; gap: 12px; justify-content: center; padding-top: 16px; flex-wrap: wrap; }
        button { background: #1a1f2a; border: none; color: #c0d0e6; font-family: inherit; font-size: 16px; font-weight: bold; padding: 12px 28px; border-radius: 60px; cursor: pointer; transition: 0.1s linear; box-shadow: 0 3px 0 #0b0e12; }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #0b0e12; }
        .btn-primary { background: #2ecc71; color: #0a0c12; box-shadow: 0 3px 0 #1e8a4c; }
        #bossHealth { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 20px; color: #ff4444; font-size: 14px; font-weight: bold; border: 1px solid #ff4444; z-index: 5; white-space: nowrap; }
        @media (max-width: 500px) { .game-wrapper { padding: 12px; border-radius: 32px; } .game-panel { padding: 12px; } .ui-top { font-size: 15px; } button { font-size: 14px; padding: 10px 20px; } #bossHealth { font-size: 12px; padding: 2px 10px; top: 8px; } }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-panel" style="position:relative;">
        <div id="bossHealth">❤️ БОСС: <span id="bossHpDisplay">50</span></div>
        <div class="ui-top">
            <span>🚀 <span id="scoreDisplay">0</span></span>
            <span class="best">🏆 <span id="bestDisplay">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div class="controls">
            <button id="restartBtn" class="btn-primary">🔄 НАЧАТЬ</button>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');
        const bossHealthEl = document.getElementById('bossHealth');
        const bossHpDisplay = document.getElementById('bossHpDisplay');

        const W = 400, H = 600;
        const PLAYER_SIZE = 28;

        // ---- ЗВУКИ ----
        let audioCtx = null;
        let engineSource = null;
        let engineGain = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startEngine();
            }
        }

        function startEngine() {
            if (!audioCtx || engineSource) return;
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                let t = i / audioCtx.sampleRate;
                let hum = Math.sin(2 * Math.PI * 55 * t) * 0.5;
                let rumble = Math.sin(2 * Math.PI * 110 * t + 0.5) * 0.3;
                let noise = (Math.random() - 0.5) * 0.15;
                data[i] = (hum + rumble + noise) * 0.25;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.25;
            gain.gain.exponentialRampToValueAtTime(0.25, audioCtx.currentTime + 0.1);
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
            engineSource = source;
            engineGain = gain;
        }

        function stopEngine() {
            if (engineGain) {
                engineGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                setTimeout(() => {
                    if (engineSource) {
                        try { engineSource.stop(); } catch(e) {}
                        engineSource = null;
                        engineGain = null;
                    }
                }, 300);
            }
        }

        function playTone(freq, duration, volume = 0.12, type = 'sine') {
            try {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function soundDestroy() { playTone(600, 0.1, 0.1, 'sawtooth'); }
        function soundShieldPickup() { playTone(440, 0.2, 0.15); setTimeout(() => playTone(660, 0.15, 0.1), 100); }
        function soundShieldBreak() { playTone(200, 0.3, 0.15, 'sawtooth'); playTone(150, 0.2, 0.1, 'square'); }
        function soundGunPickup() { playTone(880, 0.1, 0.1); setTimeout(() => playTone(1100, 0.15, 0.1), 80); }
        function soundGunShot() { playTone(1200, 0.05, 0.07); }
        function soundPortal() { playTone(300, 0.2, 0.08); setTimeout(() => playTone(500, 0.2, 0.06), 120); }
        function soundCrash() { playTone(150, 0.3, 0.2, 'sawtooth'); setTimeout(() => playTone(80, 0.4, 0.15, 'square'), 100); }
        function soundBossDefeat() { for (let i = 0; i < 5; i++) { setTimeout(() => playTone(400 + i * 80, 0.15, 0.12), i * 80); } }

        // ---- ИГРА ----
        let player = { x: W/2 - PLAYER_SIZE/2, y: H - 100, size: PLAYER_SIZE };
        let enemies = [];
        let bullets = [];
        let portals = [];
        let stars = [];
        let shieldActive = false, shieldTimer = 0;
        let gunsActive = false, gunsTimer = 0;
        let score = 0, bestScore = 0, gameOver = false, gameStarted = false;
        let speed = 3, spawnTimer = 0;
        let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
        let touchX = null, touchY = null;
        let portalCooldown = 0;

        let boss = null, bossActive = false, bossSpawnScore = 5000;

        function spawnBoss() {
            if (bossActive) return;
            boss = { x: W/2, y: -60, r: 40, hp: 50, maxHp: 50, speed: 0.8, phase: 0, shootTimer: 0, shootInterval: 60 };
            bossActive = true;
            bossHealthEl.style.display = 'block';
            bossHpDisplay.textContent = boss.hp;
            for (let i = 0; i < 3; i++) {
                enemies.push({ type: 'gray', x: 50 + Math.random() * (W - 100), y: -20 - i * 30, r: 16, speed: speed * 0.7 });
            }
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 1, speed: Math.random() * 0.5 + 0.2 });
            }
        }

        function loadBest() {
            try { const saved = localStorage.getItem('spaceRunnerBest'); if (saved) bestScore = parseInt(saved) || 0; } catch (e) {}
            bestDisplay.textContent = bestScore;
        }

        function saveBest() {
            if (score > bestScore) { bestScore = score; localStorage.setItem('spaceRunnerBest', String(bestScore)); bestDisplay.textContent = bestScore; }
        }

        function spawnEnemy() {
            const type = Math.random();
            let enemy = { type: 'normal', x: 0, y: -30, r: 20, speed: speed, phase: 0 };

            if (type < 0.25) {
                enemy.type = 'red';
                enemy.r = 18;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
                enemy.shootTimer = 20;
                enemy.shootInterval = 120;
            } else if (type < 0.50) {
                enemy.type = 'blue';
                enemy.r = 16;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
                enemy.phase = Math.random() * Math.PI * 2;
            } else if (type < 0.75) {
                enemy.type = 'purple';
                enemy.r = 22;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
            } else {
                enemy.type = 'gray';
                enemy.r = 18;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
            }

            // Бонусы
            const bonusChance = bossActive ? 0.92 : 0.95;
            if (Math.random() > bonusChance) {
                const bonusType = Math.random() > 0.5 ? 'shield' : 'guns';
                enemy.type = bonusType;
                enemy.r = 14;
                enemy.x = Math.random() * (W - enemy.r * 2) + enemy.r;
                enemy.speed = speed * 0.5;
            }

            enemies.push(enemy);
        }

        function spawnPortal() {
            if (portals.length >= 2) return;
            const x1 = 50 + Math.random() * (W - 100);
            const x2 = 50 + Math.random() * (W - 100);
            portals = [
                { x: x1, y: -30, w: 30, h: 30, id: 1, speed: speed * 0.6 },
                { x: x2, y: -30 - 80, w: 30, h: 30, id: 2, speed: speed * 0.6 }
            ];
        }

        function update() {
            if (!gameStarted || gameOver) return;

            speed += 0.002;
            score += Math.floor(speed * 0.8) + 1;
            scoreDisplay.textContent = score;

            if (score >= bossSpawnScore && !bossActive && !gameOver) {
                spawnBoss();
                bossSpawnScore += 5000;
            }

            spawnTimer++;
            const spawnRate = Math.max(22, 65 - speed * 1.0);
            if (spawnTimer > spawnRate) {
                spawnTimer = 0;
                spawnEnemy();
                if (Math.random() > 0.8) spawnEnemy();
                if (Math.random() > 0.97 && portals.length === 0) spawnPortal();
            }

            // Управление
            if (keys.ArrowLeft) player.x -= 6;
            if (keys.ArrowRight) player.x += 6;
            if (keys.ArrowUp) player.y -= 6;
            if (keys.ArrowDown) player.y += 6;
            if (touchX !== null) {
                const dx = touchX - (player.x + player.size / 2);
                const dy = touchY - (player.y + player.size / 2);
                if (Math.abs(dx) > 8) player.x += Math.sign(dx) * 6;
                if (Math.abs(dy) > 8) player.y += Math.sign(dy) * 6;
            }
            player.x = Math.max(0, Math.min(W - player.size, player.x));
            player.y = Math.max(0, Math.min(H - player.size, player.y));

            // Щит
            if (shieldActive) { shieldTimer--; if (shieldTimer <= 0) shieldActive = false; }

            // Пушка
            if (gunsActive) {
                gunsTimer--;
                if (gunsTimer <= 0) { gunsActive = false; }
                else if (gunsTimer % 30 === 0) {
                    bullets.push({ x: player.x + player.size/2 - 2, y: player.y - 5, dx: 0, dy: -12, w: 4, h: 14, color: '#ffaa00' });
                    soundGunShot();
                }
            }

            // Пули
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.dx; b.y += b.dy;
                if (b.y < -20 || b.y > H + 20 || b.x < -20 || b.x > W + 20) { bullets.splice(i, 1); continue; }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (e.type === 'shield' || e.type === 'guns') continue;
                    const dx = b.x - e.x; const dy = b.y - e.y;
                    if (dx*dx + dy*dy < e.r * e.r) {
                        soundDestroy();
                        enemies.splice(j, 1); bullets.splice(i, 1); score += 50;
                        break;
                    }
                }
                if (bossActive && boss) {
                    const dx = b.x - boss.x; const dy = b.y - boss.y;
                    if (dx*dx + dy*dy < (boss.r + 8) * (boss.r + 8)) {
                        boss.hp--; bossHpDisplay.textContent = boss.hp;
                        bullets.splice(i, 1); soundDestroy();
                        if (boss.hp <= 0) {
                            soundBossDefeat(); bossActive = false; boss = null;
                            bossHealthEl.style.display = 'none'; score += 500;
                            for (let k = 0; k < 20; k++) {
                                setTimeout(() => {
                                    enemies.push({ type: 'mini', x: boss.x + (Math.random() - 0.5) * 60, y: boss.y + (Math.random() - 0.5) * 60, r: 4 + Math.random() * 6, speed: speed * 0.3, dx: (Math.random() - 0.5) * 3, dy: (Math.random() - 0.5) * 3 });
                                }, k * 30);
                            }
                        }
                    }
                }
            }

            // Враги
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed || speed;

                if (e.type === 'red') {
                    e.shootTimer = (e.shootTimer || 0) + 1;
                    if (e.shootTimer > e.shootInterval) {
                        e.shootTimer = 0;
                        // Стреляет наискосок назад (влево-вниз и вправо-вниз)
                        enemies.push({ type: 'mini', x: e.x - 14, y: e.y, r: 6, speed: speed * 0.5, dx: -1.8, dy: 1.8 });
                        enemies.push({ type: 'mini', x: e.x + 14, y: e.y, r: 6, speed: speed * 0.5, dx: 1.8, dy: 1.8 });
                    }
                }

                if (e.type === 'blue') { e.phase += 0.07; e.x += Math.sin(e.phase) * 2.2; }
                if (e.type === 'purple') {
                    const dx = player.x + player.size/2 - e.x; const dy = player.y + player.size/2 - e.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 160) { e.x += dx * 0.025; e.y += dy * 0.025; }
                }
                if (e.type === 'mini') { e.x += e.dx || 0; e.y += e.speed || speed * 0.5; if (e.x < 0 || e.x > W) e.dx = -e.dx; }
                if (e.y > H + 50) { enemies.splice(i, 1); continue; }

                if (e.type !== 'shield' && e.type !== 'guns') {
                    const dx = player.x + player.size/2 - e.x; const dy = player.y + player.size/2 - e.y;
                    if (dx*dx + dy*dy < (e.r + player.size/2) * (e.r + player.size/2)) {
                        if (shieldActive) { soundShieldBreak(); shieldActive = false; enemies.splice(i, 1); continue; }
                        else { soundCrash(); stopEngine(); gameOver = true; saveBest(); return; }
                    }
                }

                if (e.type === 'shield') {
                    const dx = player.x + player.size/2 - e.x; const dy = player.y + player.size/2 - e.y;
                    if (dx*dx + dy*dy < (e.r + player.size/2) * (e.r + player.size/2)) {
                        soundShieldPickup(); shieldActive = true; shieldTimer = 600; enemies.splice(i, 1); continue;
                    }
                }
                if (e.type === 'guns') {
                    const dx = player.x + player.size/2 - e.x; const dy = player.y + player.size/2 - e.y;
                    if (dx*dx + dy*dy < (e.r + player.size/2) * (e.r + player.size/2)) {
                        soundGunPickup(); gunsActive = true; gunsTimer = 420; enemies.splice(i, 1); continue;
                    }
                }
            }

            // Босс
            if (bossActive && boss) {
                boss.y += boss.speed; boss.phase += 0.02; boss.x += Math.sin(boss.phase) * 1.2;
                boss.shootTimer = (boss.shootTimer || 0) + 1;
                if (boss.shootTimer > boss.shootInterval) {
                    boss.shootTimer = 0;
                    for (let k = 0; k < 6; k++) {
                        const angle = k * Math.PI / 3 + boss.phase;
                        enemies.push({ type: 'mini', x: boss.x, y: boss.y + 10, r: 6, speed: speed * 0.4, dx: Math.sin(angle) * 2.5, dy: 1.5 });
                    }
                }
                if (boss.y > H + 100) { bossActive = false; boss = null; bossHealthEl.style.display = 'none'; }
            }

            // Порталы
            portalCooldown--;
            for (let i = portals.length - 1; i >= 0; i--) {
                const p = portals[i];
                p.y += p.speed;
                if (p.y > H + 50) { portals.splice(i, 1); continue; }
                const dx = player.x + player.size/2 - (p.x + p.w/2);
                const dy = player.y + player.size/2 - (p.y + p.h/2);
                if (dx*dx + dy*dy < 400 && portalCooldown <= 0) {
                    const other = portals.find(pp => pp.id !== p.id);
                    if (other) { soundPortal(); player.x = other.x + other.w/2 - player.size/2; player.y = other.y + other.h/2 - player.size/2; portalCooldown = 30; }
                }
            }

            for (let s of stars) { s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            for (let s of stars) { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${0.3 + s.size*0.15})`; ctx.fill(); }

            if (bossActive && boss) {
                ctx.shadowBlur = 30; ctx.shadowColor = '#ff4444';
                ctx.fillStyle = '#cc2222'; ctx.beginPath(); ctx.arc(boss.x, boss.y, boss.r, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ff8888'; ctx.beginPath(); ctx.arc(boss.x - 10, boss.y - 10, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ff4444'; ctx.font = '18px monospace'; ctx.textAlign = 'center'; ctx.fillText('👾', boss.x, boss.y + 8);
            }

            for (let e of enemies) {
                if (e.type === 'shield') { ctx.fillStyle = '#00ff88'; ctx.shadowBlur = 20; ctx.shadowColor = '#00ff88'; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.fillText('🛡️', e.x, e.y+4); continue; }
                if (e.type === 'guns') { ctx.fillStyle = '#ff8800'; ctx.shadowBlur = 20; ctx.shadowColor = '#ff8800'; ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = '12px monospace'; ctx.textAlign = 'center'; ctx.fillText('🔫', e.x, e.y+4); continue; }
                ctx.shadowBlur = 10;
                let color = '#888';
                if (e.type === 'red') color = '#ff4444';
                else if (e.type === 'blue') color = '#4488ff';
                else if (e.type === 'purple') color = '#aa44ff';
                else if (e.type === 'gray') color = '#999';
                else if (e.type === 'mini') color = '#ff8844';
                ctx.shadowColor = color;
                ctx.fillStyle = color;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.beginPath(); ctx.arc(e.x-3, e.y-4, e.r*0.25, 0, Math.PI*2); ctx.fill();
            }

            for (let p of portals) { ctx.shadowBlur = 20; ctx.shadowColor = '#00ccff'; ctx.fillStyle = '#004466'; ctx.fillRect(p.x, p.y, p.w, p.h); ctx.strokeStyle = '#00ccff'; ctx.lineWidth = 2; ctx.strokeRect(p.x, p.y, p.w, p.h); ctx.shadowBlur = 0; ctx.fillStyle = '#00ccff'; ctx.font = '18px monospace'; ctx.textAlign = 'center'; ctx.fillText('🌀', p.x + p.w/2, p.y + p.h - 6); ctx.fillStyle = 'rgba(0,200,255,0.15)'; ctx.fillRect(p.x + 5, p.y + 5, p.w - 10, p.h - 10); }

            for (let b of bullets) { ctx.fillStyle = b.color || '#ffaa00'; ctx.shadowBlur = 15; ctx.shadowColor = b.color || '#ffaa00'; ctx.fillRect(b.x, b.y, b.w, b.h); ctx.shadowBlur = 0; }

            const px = player.x, py = player.y, s = player.size;
            if (shieldActive) { ctx.shadowBlur = 30; ctx.shadowColor = '#00ff88'; ctx.strokeStyle = 'rgba(0,255,136,0.4)'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(px + s/2, py + s/2, s/2 + 6, 0, Math.PI*2); ctx.stroke(); ctx.shadowBlur = 0; }
            ctx.shadowBlur = 20; ctx.shadowColor = '#2ecc71';
            ctx.fillStyle = '#2ecc71';
            ctx.beginPath(); ctx.moveTo(px + s/2, py); ctx.lineTo(px + s, py + s); ctx.lineTo(px, py + s); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#27ae60';
            ctx.beginPath(); ctx.moveTo(px, py + 4); ctx.lineTo(px - 6, py + 14); ctx.lineTo(px, py + 14); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(px + s, py + 4); ctx.lineTo(px + s + 6, py + 14); ctx.lineTo(px + s, py + 14); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#a0d8f1';
            ctx.beginPath(); ctx.arc(px + s/2, py + s * 0.35, 5, 0, Math.PI*2); ctx.fill();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace'; ctx.textAlign = 'center'; ctx.fillText('💥', W/2, H/2 - 30);
                ctx.font = '20px monospace'; ctx.fillStyle = '#e74c3c'; ctx.fillText('ИГРА ОКОНЧЕНА', W/2, H/2 + 30);
                ctx.fillStyle = '#c0d0e6'; ctx.font = '16px monospace'; ctx.fillText('Нажми «НАЧАТЬ»', W/2, H/2 + 70);
            }
            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff'; ctx.font = '24px monospace'; ctx.textAlign = 'center'; ctx.fillText('🚀 SPACERUN', W/2, H/2 - 20);
                ctx.font = '16px monospace'; ctx.fillStyle = '#c0d0e6'; ctx.fillText('Нажми «НАЧАТЬ»', W/2, H/2 + 30);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        function resetGame() {
            initAudio();
            if (engineSource) { try { engineSource.stop(); } catch(e) {} engineSource = null; engineGain = null; }
            setTimeout(() => { startEngine(); }, 100);
            player.x = W/2 - PLAYER_SIZE/2; player.y = H - 100;
            enemies = []; bullets = []; portals = []; score = 0; speed = 3; spawnTimer = 0;
            gameOver = false; gameStarted = true;
            shieldActive = false; shieldTimer = 0; gunsActive = false; gunsTimer = 0; portalCooldown = 0;
            boss = null; bossActive = false; bossHealthEl.style.display = 'none'; bossSpawnScore = 5000;
            scoreDisplay.textContent = '0'; loadBest(); initStars();
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (e.key in keys) { keys[e.key] = true; e.preventDefault(); }
                if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); if (gameOver || !gameStarted) resetGame(); }
            });
            document.addEventListener('keyup', (e) => {
                if (e.key in keys) { keys[e.key] = false; e.preventDefault(); }
            });
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameOver || !gameStarted) { resetGame(); return; }
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches[0];
                touchX = (touch.clientX - rect.left) * scaleX;
                touchY = (touch.clientY - rect.top) * scaleY;
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const touch = e.touches[0];
                touchX = (touch.clientX - rect.left) * scaleX;
                touchY = (touch.clientY - rect.top) * scaleY;
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchX = null; touchY = null;
            });
            document.getElementById('restartBtn').addEventListener('click', resetGame);
        }

        function start() {
            initStars();
            loadBest();
            setupControls();
            gameLoop();
        }
        start();
    })();
</script>
</body>
</html>
