<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Memuar's Space Runner</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #0a0c12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            background: #0f1117;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 100%;
        }

        .game-panel {
            background: #07090e;
            border-radius: 32px;
            padding: 20px;
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #0a0c12;
            border-radius: 24px;
            touch-action: none;
            cursor: pointer;
        }

        .ui-top {
            display: flex;
            justify-content: space-between;
            padding: 10px 4px 14px 4px;
            color: #c0d0e6;
            font-size: 18px;
            font-weight: bold;
        }

        .ui-top span {
            background: #0f1117;
            padding: 6px 18px;
            border-radius: 30px;
        }

        .ui-top .best {
            color: #f39c12;
        }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding-top: 16px;
            flex-wrap: wrap;
        }

        button {
            background: #1a1f2a;
            border: none;
            color: #c0d0e6;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0b0e12;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0b0e12;
        }

        .btn-primary {
            background: #2ecc71;
            color: #0a0c12;
            box-shadow: 0 3px 0 #1e8a4c;
        }

        @media (max-width: 500px) {
            .game-wrapper { padding: 12px; }
            .game-panel { padding: 12px; }
            .ui-top { font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-panel">
        <div class="ui-top">
            <span>🚀 <span id="scoreDisplay">0</span></span>
            <span class="best">🏆 <span id="bestDisplay">0</span></span>
        </div>

        <canvas id="gameCanvas" width="400" height="600"></canvas>

        <div class="controls">
            <button id="restartBtn" class="btn-primary">🔄 НАЧАТЬ</button>
        </div>
    </div>
</div>

<script>
    (function() {
        'use strict';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const bestDisplay = document.getElementById('bestDisplay');

        const W = 400, H = 600;
        const PLAYER_WIDTH = 28;
        const PLAYER_HEIGHT = 32;

        let player = { x: W/2 - PLAYER_WIDTH/2, y: H - 90, w: PLAYER_WIDTH, h: PLAYER_HEIGHT };
        let obstacles = [];
        let stars = [];
        let score = 0;
        let bestScore = 0;
        let gameOver = false;
        let gameStarted = false;
        let speed = 3;
        let spawnTimer = 0;
        let frame = 0;

        let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };
        let touchX = null;

        function initStars() {
            stars = [];
            for (let i = 0; i < 80; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function loadBest() {
            try {
                const saved = localStorage.getItem('spaceRunnerBest');
                if (saved) bestScore = parseInt(saved) || 0;
            } catch (e) {}
            bestDisplay.textContent = bestScore;
        }

        function saveBest() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('spaceRunnerBest', String(bestScore));
                bestDisplay.textContent = bestScore;
            }
        }

        function spawnObstacle() {
            const type = Math.random() > 0.5 ? 'asteroid' : 'wall';
            if (type === 'asteroid') {
                const r = 15 + Math.random() * 25;
                obstacles.push({
                    type: 'asteroid',
                    x: Math.random() * (W - r * 2) + r,
                    y: -r - 20,
                    r: r
                });
            } else {
                const w = 30 + Math.random() * 60;
                const gap = 50 + Math.random() * 50;
                obstacles.push({
                    type: 'wall',
                    x1: 0,
                    x2: W - w,
                    gap: gap,
                    w: w,
                    y: -20
                });
            }
        }

        function checkCollision(player, obstacle) {
            const px = player.x, py = player.y, pw = player.w, ph = player.h;

            if (obstacle.type === 'asteroid') {
                const cx = obstacle.x, cy = obstacle.y, r = obstacle.r;
                const nearX = Math.max(px, Math.min(cx, px + pw));
                const nearY = Math.max(py, Math.min(cy, py + ph));
                const dx = cx - nearX;
                const dy = cy - nearY;
                return (dx * dx + dy * dy) < (r * r);
            }

            if (obstacle.type === 'wall') {
                const left = obstacle.x1;
                const right = obstacle.x2 + obstacle.w;
                const gapStart = 20;
                const gapEnd = 20 + obstacle.gap;

                // Если корабль вообще не пересекает стену по горизонтали
                if (px + pw < left || px > right) return false;

                // Проверяем пересечение по вертикали
                const topY = obstacle.y;
                const bottomY = obstacle.y + H;

                // Проверяем верхнюю часть стены (до разрыва)
                if (py < topY + gapStart && py + ph > topY) return true;
                // Проверяем нижнюю часть стены (после разрыва)
                if (py < topY + gapEnd && py + ph > topY + gapEnd) return true;
                // Если корабль внутри разрыва — нет столкновения
                return false;
            }

            return false;
        }

        function update() {
            if (!gameStarted || gameOver) return;

            speed += 0.001;
            score += Math.floor(speed);
            scoreDisplay.textContent = score;

            spawnTimer++;
            const spawnRate = Math.max(20, 70 - speed * 2);
            if (spawnTimer > spawnRate) {
                spawnTimer = 0;
                spawnObstacle();
            }

            if (keys.ArrowLeft) player.x -= 5;
            if (keys.ArrowRight) player.x += 5;
            if (keys.ArrowUp) player.y -= 5;
            if (keys.ArrowDown) player.y += 5;

            if (touchX !== null) {
                const dx = touchX - (player.x + player.w / 2);
                if (Math.abs(dx) > 10) {
                    player.x += Math.sign(dx) * 5;
                }
            }

            player.x = Math.max(0, Math.min(W - player.w, player.x));
            player.y = Math.max(0, Math.min(H - player.h, player.y));

            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.y += speed;

                if (o.y > H + 50) {
                    obstacles.splice(i, 1);
                    continue;
                }

                if (checkCollision(player, o)) {
                    gameOver = true;
                    saveBest();
                    return;
                }
            }

            for (let s of stars) {
                s.y += s.speed;
                if (s.y > H) {
                    s.y = 0;
                    s.x = Math.random() * W;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            for (let s of stars) {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${0.3 + s.size * 0.2})`;
                ctx.fill();
            }

            for (let o of obstacles) {
                if (o.type === 'asteroid') {
                    ctx.beginPath();
                    ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
                    const grad = ctx.createRadialGradient(o.x - 5, o.y - 5, 2, o.x, o.y, o.r);
                    grad.addColorStop(0, '#8a8a8a');
                    grad.addColorStop(1, '#2a2a2a');
                    ctx.fillStyle = grad;
                    ctx.fill();
                    ctx.strokeStyle = '#5a5a5a';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                if (o.type === 'wall') {
                    const gapStart = 20;
                    const gapEnd = 20 + o.gap;
                    const left = o.x1;
                    const right = o.x2 + o.w;

                    ctx.fillStyle = '#e74c3c';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#e74c3c';

                    ctx.fillRect(left, o.y, o.w, gapStart);
                    ctx.fillRect(left, o.y + gapEnd, o.w, H);
                    ctx.shadowBlur = 0;
                }
            }

            const px = player.x, py = player.y, pw = player.w, ph = player.h;

            ctx.shadowBlur = 20;
            ctx.shadowColor = '#2ecc71';

            ctx.fillStyle = '#2ecc71';
            ctx.beginPath();
            ctx.moveTo(px + pw/2, py);
            ctx.lineTo(px + pw, py + ph);
            ctx.lineTo(px, py + ph);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#27ae60';
            ctx.beginPath();
            ctx.moveTo(px, py + 5);
            ctx.lineTo(px - 6, py + 15);
            ctx.lineTo(px, py + 15);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(px + pw, py + 5);
            ctx.lineTo(px + pw + 6, py + 15);
            ctx.lineTo(px + pw, py + 15);
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;

            ctx.fillStyle = '#a0d8f1';
            ctx.beginPath();
            ctx.arc(px + pw/2, py + ph * 0.35, 6, 0, Math.PI * 2);
            ctx.fill();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('💥', W/2, H/2 - 30);
                ctx.font = '20px monospace';
                ctx.fillStyle = '#e74c3c';
                ctx.fillText('ИГРА ОКОНЧЕНА', W/2, H/2 + 30);
                ctx.fillStyle = '#c0d0e6';
                ctx.font = '16px monospace';
                ctx.fillText('Нажми «НАЧАТЬ»', W/2, H/2 + 70);
            }

            if (!gameStarted && !gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = '24px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('🚀 КОСМИЧЕСКИЙ РАННЕР', W/2, H/2 - 20);
                ctx.font = '16px monospace';
                ctx.fillStyle = '#c0d0e6';
                ctx.fillText('Нажми «НАЧАТЬ»', W/2, H/2 + 30);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            player.x = W/2 - PLAYER_WIDTH/2;
            player.y = H - 90;
            obstacles = [];
            score = 0;
            speed = 3;
            spawnTimer = 0;
            gameOver = false;
            gameStarted = true;
            scoreDisplay.textContent = '0';
            loadBest();
            initStars();
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => {
                if (e.key in keys) { keys[e.key] = true; e.preventDefault(); }
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (gameOver || !gameStarted) resetGame();
                }
            });

            document.addEventListener('keyup', (e) => {
                if (e.key in keys) { keys[e.key] = false; e.preventDefault(); }
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameOver || !gameStarted) { resetGame(); return; }
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const touch = e.touches[0];
                touchX = (touch.clientX - rect.left) * scaleX;
            });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const touch = e.touches[0];
                touchX = (touch.clientX - rect.left) * scaleX;
            });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchX = null;
            });

            document.getElementById('restartBtn').addEventListener('click', resetGame);
        }

        function start() {
            initStars();
            loadBest();
            setupControls();
            gameLoop();
        }

        start();
    })();
</script>
</body>
</html>
